# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User Settings
# This is where you put your own settings as this will not be touched during update

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables

# Sourcing colors generated by pywal
source = $HOME/.cache/wal/colors-hyprland
# blurls = waybar
blurls = rofi

dwindle {
  pseudotile = yes
  preserve_split = yes
  special_scale_factor = 0.8
}

master {
  new_status=master
  new_on_top=1
  mfact = 0.5
}

general {
  gaps_in = 10
  gaps_out = 10
  gaps_workspaces = 50
  resize_on_border = true
  border_size = 4
  col.active_border = rgba(00ff48ff) rgba(00e1ffff) rgba(d0ff00ff) rgba(ff0000ff) rgba(0000ffff) rgba(ff9900ff)  
  col.inactive_border = rgba(015719a5) rgba(004f59a5) rgba(6d7a31a5) rgba(5900ffa5) rgba(001e59a5) rgba(aa0077a5)  


  layout = dwindle
  snap {
    enabled = true
    border_overlap = true
  }
}

decoration {
  rounding = 20
         
    blur {
        enabled = true
        xray = true
        new_optimizations = true
        size = 14
        passes = 4
        brightness = 1
        noise = 0.01
        contrast = 1
        popups = false
        popups_ignorealpha = 0.8
    }
    
    # Shadow
    shadow {
        enabled = true
        ignore_window = true
        range = 20
        offset = 2 2
        scale = 1.0
        render_power = 3
        color = rgba(ff55e5e8)
        color_inactive = rgba(ff55a5e8)
    }

    dim_inactive = true
    inactive_opacity = 0.95
    dim_strength = 0.1
    dim_special = 0
}
    
animations {
    enabled = true
    # Animation curves
    
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration
    # Animation configs
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    # animation = workspaces, 1, 2.5, softAcDecel, slide
    # animation = workspaces, 1, 7, menu_decel, slidefade 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

input {
  kb_layout=fr
  kb_variant=
  kb_model=
  kb_options=grp:alt_shift_toggle
  kb_rules=
  repeat_rate=50
  repeat_delay=300
  numlock_by_default=1
  left_handed=0
  follow_mouse=1
  float_switch_override_focus=0
  sensitivity=1.00

  touchpad {
    disable_while_typing=1
    natural_scroll=0 
    clickfinger_behavior=0
    middle_button_emulation=1
    tap-to-click=1
    drag_lock=0
  }
}

gestures {
  workspace_swipe=1
  workspace_swipe_fingers=3
  workspace_swipe_distance=400
  workspace_swipe_invert=1
  workspace_swipe_min_speed_to_force=30
  workspace_swipe_cancel_ratio=0.5
  workspace_swipe_create_new=1 
  workspace_swipe_forever=1
}

misc {
  disable_hyprland_logo = false
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  #vrr = 0
  enable_swallow = true
  focus_on_activate = false
  swallow_regex = ^(kitty)$
  #disable_autoreload = true
}

binds {
  workspace_back_and_forth=1
  allow_workspace_cycles=1
  pass_mouse_when_bound=0
}

#Could help when scaling and not pixelating
xwayland {
    force_zero_scaling = true
}

# Overview
plugin {
    hyprbars {
        bar_height = 40
        bar_color = rgba(30, 30, 30, 0.85)
        col.text = rgb(ffffff)
        bar_text_size = 12
        bar_text_font = Rubix semi-bold
        bar_text_align = left
        bar_buttons_alignment = right
        bar_button_padding = 15
        bar_padding = 15
        bar_part_of_window = true
        bar_precedence_over_border = true
        hyprbars-button = rgba(00000000), 32, , hyprctl dispatch killactive
        hyprbars-button = rgba(00000000), 26, , hyprctl dispatch fullscreen 1
        hyprbars-button = rgba(00000000), 28, , hyprctl dispatch fullscreen
        hyprbars-button = rgba(00000000), 24, , hyprctl dispatch togglefloating
   }
   hyprwinwrap {
        class = kitty-bg
   }
}
