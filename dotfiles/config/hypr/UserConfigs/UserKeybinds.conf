# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

$mainMod = SUPER
$files = nautilus
$term = kitty
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

# rofi App launcher
bindr = $mainMod, Super_L, exec, nwg-drawer -open
#bind = $mainMod, D, exec

bind = $mainMod, Return, exec, $term  # Launch terminal
bind = $mainMod, T, exec, $files

# User Added Keybinds
#bind = $mainMod SHIFT, O, exec, $UserScripts/ZshChangeTheme.sh # Change oh-my-zsh theme

bind = Super, V, exec, pkill fuzzel || cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = Super SHIFT, V, exec, pkill fuzzel || ~/.local/bin/fuzzel-emoji
bind = Ctrl+Alt, M, exec, ags run-js 'cycleMode();' # Cycle bar mode (normal, focus)
bind = Ctrl+Super, V, exec, pavucontrol # Launch pavucontrol (volume mixer)
bind = Ctrl+Super+Shift, V, exec, easyeffects # Launch EasyEffects (equalizer & other audio effec

bind = $mainMod, B, exec, ags -t sideleft
bind = $mainMod, X, exec, /home/tintin/.config/hypr/scripts/hyprbars.sh
#bind = $mainMod SHIFT, TAB, hyprexpo:expo, toggle

bind = $mainMod ALT, R, exec, pkill nwg-*; nwg-dock-hyprland -d -p bottom -mb 10 -l top; nwg-drawer -r -c 4 -ml 900 -mr 900 -mt 500 -mb 120 --nocats -spacing 2 -ovl -fscol 2 -fslen 40 -o DP-2 &
bind = $mainMod, D, exec, $scriptsDir/ToggleDock.sh
bind = $mainMod, A, exec, $scriptsDir/cava-bg.sh
# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset
