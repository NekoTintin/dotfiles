$text_color = rgba(000000FF)
$entry_background_color = rgba(27005811)
$entry_border_color = rgba(91919155)
$entry_color = rgba(EBDCFFFF)
$font_family = Rubik Light
$font_family_clock = Rubik Light
$font_material_symbols = Material Symbols Rounded

background {
   monitor = DP-2
   color = rgba(000000FF)
}

background {
    monitor = HDMI-A-1
    color = rgba(000000FF)
}
background {
    monitor = DP-1
    path = /home/tintin/Images/Wallpapers/__eternal_sakura_mahou_shoujo_madoka_magica_and_2_more__59de75d61a77f953b7b527780e64743d.png
}

input-field {
    monitor = DP-1
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.1
    dots_spacing = 0.3
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = rgb(000000)
    fade_on_empty = false

    position = -110, 85
    halign = right
    valign = bottom
}

label { # Clock
    monitor = DP-1
    text = $TIME
    color = $text_color
    font_size = 65
    font_family = $font_family_clock

    position = 130, 130
    halign = left
    valign = bottom
}
label { # Date
    monitor = DP-1
    text = cmd[update:5000] date +"%A, %B %d"
    color = $text_color
    font_size = 17
    font_family = $font_family

    position = 130, 100
    halign = left
    valign = bottom
}

image {
  monitor = DP-1
  path = /home/tintin/Images/CharaStudio-2025-12-28-11-30-00-Render.png
  size = 120
  halign = right
  valign = bottom
  position = -170, 205
  border_color = rgb(E0FF00) 
}

label { # User
    monitor = DP-1
    text = $USER
    color = $text_color
    shadow_passes = 1
    shadow_boost = 0.35
    #outline_thickness = 2
    #dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    #dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    #dots_center = true
    font_size = 30
    font_family = $font_family
    position = -190, 150
    halign = right
    valign = bottom
}

label { # Status
    monitor = DP-1
    text = cmd[update:5000] ${XDG_CONFIG_HOME:-$HOME/.config}/hypr/hyprlock/status.sh
    color = $text_color
    font_size = 14
    font_family = $font_family

    position = 30, -30
    halign = left
    valign = top
}
