# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with #! are section headings

$term = ~/.local/bin/kitty
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

#bind = , Super_L, global, quickshell:overviewToggle# Toggle overview/launcher
#bind = , Super_R, global, quickshell:overviewToggleRelease # [hidden] Toggle overview/
bind = Super_R, E, exec, hyprlauncher
bind = Super_L, E, exec, hyprlauncher

#!
##! Essentials for beginners

bind = Super, T, exec, nautilus # Launch nautilus
bind = Super, Return, exec, $term
# Tablet Mode
bind = , F1, exec, $scriptsDir/ChangeOTDMode.sh

##! Actions
# Screenshot, Record, OCR, Color picker, Clipboard history:
bindd = Super, V, Clipboard history >> clipboard, global, quickshell:overviewClipboardToggle
bindd = Super, Period, Emoji >> clipboard, global, quickshell:overviewEmojiToggle # Pick emoji >> clipboard
bind = Ctrl+Shift+Alt, Delete, exec, pkill wlogout || wlogout -p layer-shell # [hidden]
bind = Super+Shift+Alt, S, exec, grim -g "$(slurp)" - | swappy -f - # Screen snip >> edit
# OCR
bind = Super+Shift,T,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract -l eng "tmp.png" - | wl-copy && rm "tmp.png" # Screen snip to text >> clipboard
bind = Ctrl+Super+Shift,S,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract "tmp.png" - | wl-copy && rm "tmp.png" # [hidden]
# Color picker
bind = Super, C, exec, hyprpicker -a # Pick color (Hex) >> clipboard

##! Window management
# Focusing
#/# bind = Super, ←/↑/→/↓,, # Move focus in direction
bind = Super, Left, movefocus, l # [hidden]
bind = Super, Right, movefocus, r # [hidden]
bind = Super, Up, movefocus, u # [hidden]
bind = Super, Down, movefocus, d # [hidden]
bind = Super, Q, killactive,
bind = Super+Shift+Alt, Q, exec, hyprctl kill # Pick and kill a window

bind = CTRL SHIFT, F, togglefloating
bind = CTRL SHIFT, O, pin
bind = super ALT, F, exec, hyprctl dispatch workspaceopt allfloat
bind = super, F, fullscreen
bindd = Super Alt, C, Center Window, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 800 600 && hyprctl dispatch centerwindow

#!
##! Workspace navigation
# Resize windows
binde = super SHIFT, left, resizeactive,-50 0
binde = super SHIFT, right, resizeactive,50 0
binde = super SHIFT, up, resizeactive,0 -50
binde = super SHIFT, down, resizeactive,0 50

# Move windows
bind = super CTRL, left, movewindow, l
bind = super CTRL, right, movewindow, r
bind = super CTRL, up, movewindow, u
bind = super CTRL, down, movewindow, d

# Workspaces related
bind = super, tab, workspace, m+1
bind = super SHIFT, tab, workspace, m-1

# Special workspace
bind = super CTRL, A, movetoworkspace, special
bind = super, A, togglespecialworkspace,

# The following mappings use the key codes to better support various keyboard layouts
# 1 is code:10, 2 is code 11, etc
# Switch workspaces with mainMod + [0-9] 
bind = super, code:10, workspace, 1
bind = super, code:11, workspace, 2
bind = super, code:12, workspace, 3
bind = super, code:13, workspace, 4
bind = super, code:14, workspace, 5
bind = super, code:15, workspace, 6
bind = super, code:16, workspace, 7
bind = super, code:17, workspace, 8
bind = super, code:18, workspace, 9
bind = super, code:19, workspace, 10

# Move active window and follow to workspace mainMod + SHIFT [0-9]
bind = super SHIFT, code:10, movetoworkspace, 1
bind = super SHIFT, code:11, movetoworkspace, 2
bind = super SHIFT, code:12, movetoworkspace, 3
bind = super SHIFT, code:13, movetoworkspace, 4
bind = super SHIFT, code:14, movetoworkspace, 5
bind = super SHIFT, code:15, movetoworkspace, 6
bind = super SHIFT, code:16, movetoworkspace, 7
bind = super SHIFT, code:17, movetoworkspace, 8
bind = super SHIFT, code:18, movetoworkspace, 9
bind = super SHIFT, code:19, movetoworkspace, 10
bind = super SHIFT, bracketleft, movetoworkspace, -1 # brackets [ or ]
bind = super SHIFT, bracketright, movetoworkspace, +1

# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = super CTRL, code:10, movetoworkspacesilent, 1
bind = super CTRL, code:11, movetoworkspacesilent, 2
bind = super CTRL, code:12, movetoworkspacesilent, 3
bind = super CTRL, code:13, movetoworkspacesilent, 4
bind = super CTRL, code:14, movetoworkspacesilent, 5
bind = super CTRL, code:15, movetoworkspacesilent, 6
bind = super CTRL, code:16, movetoworkspacesilent, 7
bind = super CTRL, code:17, movetoworkspacesilent, 8
bind = super CTRL, code:18, movetoworkspacesilent, 9
bind = super CTRL, code:19, movetoworkspacesilent, 10
bind = super CTRL, bracketleft, movetoworkspacesilent, -1 # brackets [ or ]
bind = super CTRL, bracketright, movetoworkspacesilent, +1

# Scroll through existing workspaces with mainMod + scroll
bind = super, mouse_down, workspace, e+1
bind = super, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = super, mouse:272, movewindow
bindm = super, mouse:273, resizewindow

# Color Picker
bind = super SHIFT, C, exec, hyprpicker -a

# Quickshell
bindd = Alt, Tab, Toggle overview, global, quickshell:searchToggleRelease
bind=super, R, exec, pkill quickshell; bash ~/.config/quickshell/qs_launch.sh # Restart quickshell

##! Widgets
bindd = Super, K, Toggle right sidebar, global, quickshell:sidebarRightToggle
bindd = Super, B, Toggle left sidebar, global, quickshell:sidebarLeftToggle
bindd = Super, M, Toggle media controls, global, quickshell:mediaControlsToggle
bindd = Super, P, Toggle session menu, global, quickshell:sessionToggle


bindle=, XF86MonBrightnessUp, exec, qs -c $qsConfig ipc call brightness increment || brightnessctl s 5%+ # [hidden]
bindle=, XF86MonBrightnessDown, exec, qs -c $qsConfig ipc call brightness decrement || brightnessctl s 5%- # [hidden]
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ # [hidden]
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- # [hidden]
bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]

##! Media
bindl= Super+Shift, N, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # Next track
bindl= ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl= ,XF86AudioPrev, exec, playerctl previous # [hidden]
bindel = Super+Shift, Comma, exec, ~/.config/ags/scripts/music/adjust-volume.sh -0.03 # Raise music volume
bindel = Super+Shift, Period, exec, ~/.config/ags/scripts/music/adjust-volume.sh 0.03 # Lower music volume
bind = Super+Shift+Alt, mouse:275, exec, playerctl previous # [hidden]
bind = Super+Shift+Alt, mouse:276, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"` # [hidden]
bindl= Super+Shift, B, exec, playerctl previous # Previous track
bindl= Super+Shift, P, exec, playerctl play-pause # Play/pause media
bindl= ,XF86AudioPlay, exec, playerctl play-pause # [hidden]
bindl= ,XF86AudioPause, exec, playerctl play-pause # [hidden]

#!
##! Apps
bind = CTRL ALT, DELETE, exec, /usr/bin/flatpak run io.missioncenter.MissionCenter
bindd = Super, W, Toggle wallpaper selector, global, quickshell:wallpaperSelectorToggle
bind = Super, I, exec, XDG_CURRENT_DESKTOP="gnome" gnome-control-center # Launch GNOME Settings
bind = Ctrl+Super, V, exec, pavucontrol # Launch pavucontrol (volume mixer)

# Cursed stuff
## Make window not amogus large
bind = CTRL SUPER, BACKSPACE, resizeactive, exact 640 480

binddd = SUPER, D, Toggle Bar, global, quickshell:barToggle
bind = Ctrl+Super+Shift, V, exec, easyeffects # Launch EasyEffects (equalizer & other audio effects)

# screenshot with swappy (another screenshot tool)
bind = Super SHIFT, S, exec, /home/tintin/.local/bin/hyprshot --freeze -m region -o /home/tintin/Images/Screenshots
bind = Super, S, exec, /home/tintin/.local/bin/hyprshot -m window --clipboard-only -o /home/tintin/Images/Screenshots

#bind = SUPER, P, overview:toggle
bind = SUPER, L, exec, hyprlock

# Puppet
bind = SUPER, F7, exec, $HOME/.var/app/moe.nyarchlinux.assistant/config/avatars/live2d/DesktopPuppet/src/cli.sh set-overlay background
bind = SUPER, F8, exec, $HOME/.var/app/moe.nyarchlinux.assistant/config/avatars/live2d/DesktopPuppet/src/cli.sh set-overlay overlay
bind = SUPER, F10, sendshortcut, Control_L, s, title:nyarchassistant
bind = SUPER, F9, sendshortcut, Control_L, k, title:nyarchassistant

bind = SUPER, H, exec, /home/tintin/.config/hypr/scripts/auto_hotspot.sh

# Linux fake activation script
bind = CTRL SHIFT, L, exec, $scriptsDir/activate_linux.sh

bind = SUPER, N, setfloating
bind = SUPER, N, pin
bind = SUPER, N, resizeactive, exact 100 100
bind = SUPER, N, movewindow, l
bind = SUPER, N, movewindow, u
