#MONITOR CONFIG

# 42
monitor = eDP-1, 1920x1080@60, 0x0, 1
#monitor = DP-2, disable
#monitor = DP-2, 2560x1440, 0x-1440, 1
#monitor = eDP-1, disable

# Home
monitor = DP-2, 1280x1024@75, 0x0, 1
monitor = DP-1, 2560x1440@144, 1280x-600, 1
#monitor = DP-1, disable
#monitor = HDMI-A-1, 1920x1080@75, 1280x-200, 1
monitor = HDMI-A-1, 1920x1080@75, 3840x-600, 1
# HDMI port: mirror display. To see device name, use `hyprctl monitors`
# monitor=HDMI-A-1,1920x1080@60,1920x0,1,mirror,eDP-1

dwindle {
  pseudotile = yes
  preserve_split = yes
  special_scale_factor = 0.8
}

master {
  new_status=master
  new_on_top=1
  mfact = 0.5
}

input {
  kb_layout=fr
  kb_variant=
  kb_model=
  kb_options=grp:alt_shift_toggle
  kb_rules=
  repeat_rate=50
  repeat_delay=300
  numlock_by_default=1
  left_handed=0
  follow_mouse=1
  float_switch_override_focus=0
  sensitivity=1.00

  touchpad {
    disable_while_typing=1
    natural_scroll=0 
    clickfinger_behavior=0
    middle_button_emulation=1
    tap-to-click=1
    drag_lock=0
  }
}

binds {
    # focus_window_on_workspace_c# For Auto-run stuff see execs.confhange = true
    scroll_event_delay = 0
}

gestures {
  gesture = 3, horizontal, scale: 400, workspace
}

general {
  gaps_in = 12
  gaps_out = 12
  gaps_workspaces = 50
  resize_on_border = true
  border_size = 4
  col.active_border = rgba(00ff48ff) rgba(00e1ffff) rgba(d0ff00ff) rgba(ff0000ff) rgba(0000ffff) rgba(ff9900ff)  
  col.inactive_border = rgba(015719ff) rgba(004f59ff) rgba(6d7a31ff) rgba(5900ffcc) rgba(001e59ff) rgba(aa0077ff)

  layout = dwindle
  snap {
    enabled = true
    border_overlap = true
  }
}

decoration {
  rounding = 26
         
    blur {
        enabled = true
        xray = true
        new_optimizations = true
        size = 4
        passes = 2
        brightness = 1
        noise = 0.01
        contrast = 1
        popups = false
        popups_ignorealpha = 0.8
    }
    
    # Shadow
    shadow {
        enabled = true
        ignore_window = true
        range = 10
        offset = 2 2
        scale = 1.0
        render_power = 3
        color = rgba(ff55e5e8)
        color_inactive = rgba(ff55a5e8)
    }

    dim_inactive = true
    inactive_opacity = 0.95
    dim_strength = 0.1
    dim_special = 0
}

animations {
    enabled = true
    # Animation curves
    
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration
    # Animation configs
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 0.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    # animation = workspaces, 1, 2.5, softAcDecel, slide
    # animation = workspaces, 1, 7, menu_decel, slidefade 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

misc {
    vfr = 1
    vrr = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    mouse_move_enables_dpms = true
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    allow_session_lock_restore = true
    
    initial_workspace_tracking = false
}

plugin {
    hyprbars {
        bar_height = 35
        bar_color = rgba(30, 30, 30, 0.7)
        col.text = rgb(ffffff)
        bar_text_size = 12
        bar_text_font = Rubik bold
        bar_text_align = center	
        bar_blur = true
        bar_buttons_alignment = right
        bar_button_padding = 15
        bar_padding = 25
        bar_part_of_window = true
        bar_precedence_over_border = false
        icon_on_hover = true
        on_double_click = hyprctl dispatch fullscreen 1
        hyprbars-button = rgba(00000000), 30, , hyprctl dispatch killactive
        hyprbars-button = rgba(00000000), 28, , hyprctl dispatch fullscreen 1
        hyprbars-button = rgba(00000000), 30, , hyprctl dispatch fullscreen
        hyprbars-button = rgba(00000000), 30, , hyprctl dispatch togglefloating
	hyprbars-button = rgba(00000000), 30, 🖈, hyprctl dispatch togglefloating ; hyprctl dispatch pin
   }
   hyprwinwrap {
    class = kitty-bg
   }
   borders-plus-plus {
	      add_borders = 1
        col.border_1 = rgba(9898A6A1)
	      border_size_1 = 5
   }
}

